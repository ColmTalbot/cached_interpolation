name: Python Unit Testing

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.13t", "3.14t"]
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        # setup requirements
        python -m pip install cython numpy
        # testing requirements
        python -m pip install pytest-cov pre-commit scipy
        python -m pip install jax || true
        python -m pip install torch --index-url https://download.pytorch.org/whl/cpu || true
    - name: Install package
      run: |
        export CYTHON_COVERAGE=1
        python -m pip install -v -e .
    - name: Run pre-commit checks
      run: |
        pre-commit install
        pre-commit run --all-files --verbose --show-diff-on-failure
    - name: List installed
      run: |
        python -m pip list
    - name: Test with pytest
      run: |
        pytest --pyargs cached_interpolate.test --cov cached_interpolate -ra --color yes --cov-report=xml --junitxml=pytest.xml
    - name: Publish coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: coverage.xml
        flags: python${{ matrix.python-version }}
    - name: Coverage report
      run: python -m coverage report --show-missing
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-${{ matrix.python-version }}
        path: pytest.xml
